events {}

http {
  server {
    listen 80;

    # analyze はOpenAI呼び出しで時間がかかるため長めに設定
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    location /dreamer/ {
      proxy_pass http://dreamer-service:8000/;
    }

    location /job/ {
      proxy_pass http://job-service:8000/;
    }
  }
}
